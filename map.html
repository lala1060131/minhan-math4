<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習地圖｜數學冒險樂園</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FF7EB6; --pink-deep:#F45D9E; --pink-soft:#FFD6E8;
  --bg:#FDEBF4; --panel:#FFF8FC; --ink:#7A4A63; --ink-strong:#B94B7E; --ink-soft:#B48CA5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;color:var(--ink);
  background:linear-gradient(180deg,#FBD9EC 0%,#E9F7FF 50%,#FDF2F8 100%);min-height:100vh}
.num{font-family:'Baloo 2','Noto Sans TC',sans-serif}
a{text-decoration:none;color:inherit;font-family:inherit}
.wrap{max-width:520px;margin:0 auto;padding:14px 14px 60px}
.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{display:flex;align-items:center;gap:6px;background:#fff;border:2.5px solid var(--pink-soft);
  border-radius:999px;padding:8px 16px;font-weight:900;font-size:.88rem;color:var(--pink-deep);
  box-shadow:0 4px 10px rgba(244,93,158,.12)}
.hero{background:linear-gradient(160deg,#FFE3F1,#DCF3FF);border:3px solid #FFC7DE;border-radius:28px;
  padding:20px 22px;text-align:center;box-shadow:0 10px 24px rgba(244,93,158,.15);margin-bottom:8px}
.hero h1{font-size:1.6rem;font-weight:900;color:var(--ink-strong);letter-spacing:.08em}
.hero .sub{font-size:.82rem;font-weight:700;color:var(--ink-soft);margin-top:4px}

.path{position:relative;padding:20px 0}
.trail-svg{position:absolute;left:0;top:0;width:100%;height:100%;z-index:0}
.stop{position:relative;z-index:1;display:flex;align-items:center;gap:14px;margin-bottom:36px}
.stop:nth-child(even){flex-direction:row-reverse;text-align:right}
.stop .node{flex:none;width:70px;height:70px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border:4px solid #fff;box-shadow:0 8px 18px rgba(122,74,99,.2);
  position:relative}
.stop .node .emoji{font-size:1.7rem}
.stop .node .no{position:absolute;top:-8px;left:-8px;background:#fff;border-radius:50%;width:24px;height:24px;
  display:grid;place-items:center;font-size:.72rem;font-weight:900;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.stop .card{flex:1;background:var(--panel);border:2.5px solid var(--pink-soft);border-radius:18px;
  padding:12px 14px;box-shadow:0 6px 14px rgba(244,93,158,.1)}
.stop .card .name{font-weight:900;font-size:.95rem;color:var(--ink)}
.stop .card .status{font-size:.75rem;font-weight:800;margin-top:4px}
.stop.done .node{background:linear-gradient(160deg,#8BE9D0,#4FBE85)}
.stop.progress .node{background:linear-gradient(160deg,#FFE66D,#F4B94B)}
.stop.todo .node{background:linear-gradient(160deg,#F0DDE8,#E0C7D6)}
.stop.done .status{color:#2FA362}
.stop.progress .status{color:#C1793E}
.stop.todo .status{color:var(--ink-soft)}
.mascot-marker{position:absolute;font-size:1.8rem;left:35px;transform:translateX(-50%);z-index:2;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
@media(prefers-reduced-motion:reduce){.mascot-marker{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">← 回首頁</a>
  </div>
  <div class="hero">
    <h1>🗺️ 學習地圖</h1>
    <div class="sub">跟著小兔兔一起走完翰林四上的旅程！</div>
  </div>

  <div class="path" id="pathWrap"></div>
</div>

<script>
const UNITS = [
  {id:'u1', emoji:'🔢', name:'一億以內的數'},
  {id:'u2', emoji:'✖️', name:'乘法'},
  {id:'u3', emoji:'📐', name:'角度'},
  {id:'u4', emoji:'🍰', name:'假分數與帶分數'},
  {id:'u5', emoji:'🚗', name:'公里'},
  {id:'u6', emoji:'➗', name:'除法'},
  {id:'u7', emoji:'🔺', name:'三角形與全等'},
  {id:'u8', emoji:'🧮', name:'兩步驟問題與併式'},
  {id:'u9', emoji:'🔢', name:'二位小數'},
  {id:'u10', emoji:'📊', name:'統計圖表'},
];

let prog = {};
try { prog = JSON.parse(localStorage.getItem('sm_progress') || '{}'); } catch(e){}

let currentIdx = UNITS.findIndex(u => !(prog[u.id] && prog[u.id].done >= 10));
if(currentIdx === -1) currentIdx = UNITS.length; // 全部完成

const wrap = document.getElementById('pathWrap');
wrap.innerHTML = UNITS.map((u,i) => {
  const d = prog[u.id] ? prog[u.id].done : 0;
  let cls = 'todo', status = '尚未開始';
  if(d >= 10){ cls='done'; status='✅ 已完成 10/10'; }
  else if(d > 0){ cls='progress'; status=`📖 進行中 ${d}/10`; }
  const filename = 'unit' + u.id.slice(1) + '.html';
  const marker = i === currentIdx ? '<span class="mascot-marker">🐰</span>' : '';
  return `<a class="stop ${cls}" href="${filename}" style="text-decoration:none;color:inherit">
    ${marker}
    <div class="node"><span class="no">${i+1}</span><span class="emoji">${u.emoji}</span></div>
    <div class="card">
      <div class="name">${u.name}</div>
      <div class="status">${status}</div>
    </div>
  </a>`;
}).join('');
</script>
</body>
</html>
