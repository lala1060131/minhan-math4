<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>錯題本｜數學冒險樂園</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FF7EB6; --pink-deep:#F45D9E; --pink-soft:#FFD6E8;
  --bg:#FDEBF4; --panel:#FFF8FC; --ink:#7A4A63; --ink-strong:#B94B7E; --ink-soft:#B48CA5;
  --good:#57C785; --bad:#F87171;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;color:var(--ink);
  background:linear-gradient(180deg,#FBD9EC 0%,#FDEBF4 40%,#FDF2F8 100%);min-height:100vh}
.num{font-family:'Baloo 2','Noto Sans TC',sans-serif}
button{font-family:inherit;cursor:pointer}
button:focus-visible,a:focus-visible{outline:3px solid #CDB4FF;outline-offset:2px}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px 60px}
.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{display:flex;align-items:center;gap:6px;background:#fff;border:2.5px solid var(--pink-soft);
  border-radius:999px;padding:8px 16px;font-weight:900;font-size:.88rem;color:var(--pink-deep);
  text-decoration:none;box-shadow:0 4px 10px rgba(244,93,158,.12)}
.clear-btn{margin-left:auto;background:#fff;border:2.5px solid #FFC9C9;color:#E14F4F;
  border-radius:999px;padding:8px 16px;font-weight:900;font-size:.85rem}
.hero{background:linear-gradient(160deg,#E8F5FF,#F3EAFF);border:3px solid #BFE4FF;border-radius:28px;
  padding:20px 22px;text-align:center;box-shadow:0 10px 24px rgba(84,174,232,.15);margin-bottom:14px}
.hero h1{font-size:1.6rem;font-weight:900;color:#2F8FD4;letter-spacing:.08em}
.hero .sub{font-size:.82rem;font-weight:700;color:var(--ink-soft);margin-top:4px}
.unit-group{background:var(--panel);border:2.5px solid var(--pink-soft);border-radius:24px;
  padding:16px;box-shadow:0 8px 20px rgba(244,93,158,.1);margin-bottom:14px}
.unit-group h2{font-size:1rem;font-weight:900;color:var(--ink-strong);margin-bottom:12px;
  display:flex;align-items:center;gap:8px}
.unit-group h2 .cnt{margin-left:auto;font-size:.72rem;background:#FFE3F0;color:var(--pink-deep);
  border-radius:999px;padding:3px 12px}
.witem{background:#fff;border:2px solid #F0DDE8;border-radius:18px;padding:13px 15px;margin-bottom:10px;
  font-size:.93rem;line-height:1.7}
.witem .q{font-weight:900;color:var(--ink-strong);margin-bottom:6px}
.witem .row{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0}
.pill{border-radius:999px;padding:3px 12px;font-size:.78rem;font-weight:800}
.pill.wrong{background:#FFF1F1;color:#E14F4F;border:1.5px solid #FFC9C9}
.pill.right{background:#EAFBF0;color:#2FA362;border:1.5px solid #C4EDD2}
.pill.times{background:#FFF4DE;color:#E0862B;border:1.5px solid #FFE1AD}
.witem .ex{background:#F8F3FB;border-radius:12px;padding:8px 12px;font-size:.85rem;margin-top:8px;color:#7A5A8C}
.empty{text-align:center;padding:50px 20px;background:var(--panel);border:2.5px dashed var(--pink-soft);
  border-radius:24px}
.empty .face{font-size:3.6rem}
.empty .t{font-weight:900;font-size:1.1rem;color:var(--ink-strong);margin:10px 0 4px}
.empty .s{font-size:.85rem;color:var(--ink-soft);font-weight:700;line-height:1.7}
.empty a{display:inline-block;margin-top:14px;background:linear-gradient(135deg,#FF9DC7,var(--pink-deep));
  color:#fff;text-decoration:none;font-weight:900;border-radius:999px;padding:12px 30px;
  box-shadow:0 6px 0 #E0498B}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">← 回首頁</a>
    <button class="clear-btn" id="clearBtn" onclick="clearAll()" style="display:none">🗑 清空錯題本</button>
  </div>

  <div class="hero">
    <h1>📘 我的錯題本</h1>
    <div class="sub">錯過的題目都在這裡，弄懂它們就變超強！</div>
  </div>

  <div id="list"></div>
</div>

<script>
const UNIT_LINKS={u1:'unit1.html',u2:'unit2.html',u3:'unit3.html',u4:'unit4.html',u5:'unit5.html',u6:'unit6.html',u7:'unit7.html',u8:'unit8.html',u9:'unit9.html',u10:'unit10.html'};
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function render(){
  let wrong=[];
  try{wrong=JSON.parse(localStorage.getItem('sm_wrong')||'[]')}catch(e){}
  const list=document.getElementById('list');
  if(!wrong.length){
    document.getElementById('clearBtn').style.display='none';
    list.innerHTML=`<div class="empty">
      <div class="face">🐰🌸</div>
      <div class="t">錯題本空空的，超棒！</div>
      <div class="s">目前沒有答錯的題目。<br>去挑戰測驗，答錯的題目會自動收進來這裡復習。</div>
      <a href="index.html">去挑戰 💗</a></div>`;
    return;
  }
  document.getElementById('clearBtn').style.display='block';
  // 依單元分組
  const groups={};
  wrong.forEach(w=>{(groups[w.unit]=groups[w.unit]||{name:w.unitName,items:[]}).items.push(w)});
  list.innerHTML=Object.entries(groups).map(([uid,g])=>`
    <div class="unit-group">
      <h2>🍭 ${esc(g.name)}<span class="cnt">${g.items.length} 題</span></h2>
      ${g.items.map(w=>`
        <div class="witem">
          <div class="q">Q：${esc(w.q)}</div>
          <div class="row">
            <span class="pill wrong">我的答案：${esc(w.chosen)}</span>
            <span class="pill right">正確答案：${esc(w.answer)}</span>
            ${w.count>1?`<span class="pill times">錯過 ${w.count} 次</span>`:''}
          </div>
          <div class="ex">💡 ${esc(w.explain)}</div>
        </div>`).join('')}
      ${UNIT_LINKS[uid]?`<a class="back" style="display:inline-flex" href="${UNIT_LINKS[uid]}">再去挑戰這個單元 →</a>`:''}
    </div>`).join('');
}
function clearAll(){
  if(confirm('確定要清空全部錯題嗎？清掉就不能復原囉！')){
    try{localStorage.removeItem('sm_wrong')}catch(e){}
    render();
  }
}
render();
</script>
</body>
</html>
