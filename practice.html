<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課程練習｜數學冒險樂園</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FF7EB6; --pink-deep:#F45D9E; --pink-soft:#FFD6E8;
  --bg:#FDEBF4; --panel:#FFF8FC; --ink:#7A4A63; --ink-strong:#B94B7E; --ink-soft:#B48CA5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;color:var(--ink);
  background:linear-gradient(180deg,#FBD9EC 0%,#FDEBF4 40%,#FDF2F8 100%);min-height:100vh}
.num{font-family:'Baloo 2','Noto Sans TC',sans-serif}
a,button{text-decoration:none;color:inherit;font-family:inherit}
.wrap{max-width:640px;margin:0 auto;padding:14px 14px 60px}
.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{display:flex;align-items:center;gap:6px;background:#fff;border:2.5px solid var(--pink-soft);
  border-radius:999px;padding:8px 16px;font-weight:900;font-size:.88rem;color:var(--pink-deep);
  box-shadow:0 4px 10px rgba(244,93,158,.12)}
.hero{background:linear-gradient(160deg,#FFE3F1,#F3EAFF);border:3px solid #FFC7DE;border-radius:28px;
  padding:20px 22px;text-align:center;box-shadow:0 10px 24px rgba(244,93,158,.15);margin-bottom:14px}
.hero h1{font-size:1.6rem;font-weight:900;color:var(--ink-strong);letter-spacing:.08em}
.hero .sub{font-size:.82rem;font-weight:700;color:var(--ink-soft);margin-top:4px}

.list{display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:12px;background:var(--panel);border:2.5px solid var(--pink-soft);
  border-radius:20px;padding:12px 14px;box-shadow:0 6px 14px rgba(244,93,158,.1)}
.row .emoji{font-size:1.7rem;flex:none;width:34px;text-align:center}
.row .name{flex:1;font-weight:900;font-size:.92rem}
.row .best{flex:none;font-size:.78rem;font-weight:800;color:var(--ink-soft);margin-right:4px}
.row .go{flex:none;background:linear-gradient(135deg,#FF9DC7,var(--pink-deep));color:#fff;
  border:none;border-radius:999px;padding:8px 16px;font-size:.8rem;font-weight:900;box-shadow:0 4px 0 #E0498B}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">← 回首頁</a>
  </div>
  <div class="hero">
    <h1>📝 課程練習</h1>
    <div class="sub">想加強哪個單元？直接點進去挑戰 10 題！</div>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
const UNITS = [
  {id:'u1', emoji:'🔢', name:'一億以內的數'},
  {id:'u2', emoji:'✖️', name:'乘法'},
  {id:'u3', emoji:'📐', name:'角度'},
  {id:'u4', emoji:'🍰', name:'假分數與帶分數'},
  {id:'u5', emoji:'🚗', name:'公里'},
  {id:'u6', emoji:'➗', name:'除法'},
  {id:'u7', emoji:'🔺', name:'三角形與全等'},
  {id:'u8', emoji:'🧮', name:'兩步驟問題與併式'},
  {id:'u9', emoji:'🔢', name:'二位小數'},
  {id:'u10', emoji:'📊', name:'統計圖表'},
];
let prog = {};
try { prog = JSON.parse(localStorage.getItem('sm_progress') || '{}'); } catch(e){}

document.getElementById('list').innerHTML = UNITS.map((u,i) => {
  const d = prog[u.id] ? prog[u.id].done : 0;
  const filename = 'unit' + u.id.slice(1) + '.html';
  return `<div class="row">
    <div class="emoji">${u.emoji}</div>
    <div class="name">${i+1}. ${u.name}</div>
    <div class="best num">${d ? '最高 '+d+'/10' : '尚未挑戰'}</div>
    <a class="go" href="${filename}">練習</a>
  </div>`;
}).join('');
</script>
</body>
</html>
